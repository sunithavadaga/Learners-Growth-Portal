<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="admin-dashboard.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

</head>

<body>


    <div class="dashboard-container">

        <h1>Learner Growth Portal</h1>

        <h2>ADMIN COMMAND CENTER</h2>

        <p>
            Welcome Back, Administrator!
        </p>


        <!-- SUMMARY CARDS -->

        <div class="summary-cards">

            <div class="card">
                <h3>Total Courses</h3>
                <p>0</p>
            </div>

            <div class="card">
                <h3>Total Batches</h3>
                <p>0</p>
            </div>

            <div class="card">
                <h3>Total Faculty</h3>
                <p>0</p>
            </div>

            <div class="card">
                <h3>Total Learners</h3>
                <p>0</p>
            </div>

        </div>



        <!-- MASTER DATA -->

        <div class="section">

            <h2>Master Data Management</h2>

            <div class="grid">

                <button>Manage Courses</button>
                <button>Manage Batches</button>
                <button>Manage Faculty</button>
                <button>Manage Students</button>

            </div>

        </div>



        <!-- GROWTH MISSIONS -->

        <div class="section">

            <h2>Growth Mission Management</h2>

            <div class="grid">

                <button>View Growth Missions</button>
                <button>View Submissions</button>
                <button>Reports</button>
                <button>Leaderboard</button>

            </div>

        </div>



        <!-- BULK UPLOAD -->

        <div class="section">

            <h2>Bulk Upload Center</h2>

            <div class="grid">

                <button>Upload Students</button>
                <button>Upload Faculty</button>
                <button>Upload Courses</button>
                <button>Upload Batches</button>

            </div>

        </div>



        <!-- ANALYTICS -->

        <div class="section">

            <h2>Analytics</h2>

            <div class="grid">

                <button>Active Learners</button>
                <button>Completed Missions</button>
                <button>Pending Missions</button>
                <button>Portal Analytics</button>

            </div>

        </div>



        <!-- LOGOUT -->

        <div class="logout-section">

            <button class="logout-btn">

                Logout

            </button>

        </div>


    </div>

</body>

</html>
