<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Faculty Dashboard</title>

<link rel="stylesheet"
href="./css/faculty-dashboard.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

</head>

<body>


<div class="dashboard-container">

<h1>Learner Growth Portal</h1>

<h2>FACULTY COMMAND CENTER</h2>

<p>

Welcome Back, Mentor!

</p>


<!-- SUMMARY CARDS -->

<div class="summary-cards">

<div class="card">

<h3>Total Batches</h3>

<p>0</p>

</div>


<div class="card">

<h3>Growth Missions</h3>

<p>0</p>

</div>


<div class="card">

<h3>Submissions</h3>

<p>0</p>

</div>


<div class="card">

<h3>Pending Reviews</h3>

<p>0</p>

</div>

</div>



<!-- BATCH MANAGEMENT -->

<div class="section">

<h2>Batch Management</h2>

<div class="grid">

<button>View Batches</button>

<button>Assigned Courses</button>

</div>

</div>



<!-- GROWTH MISSIONS -->

<div class="section">

<h2>Growth Missions</h2>

<div class="grid">

<button>Create Growth Mission</button>

<button>View Missions</button>

<button>Edit Missions</button>

</div>

</div>



<!-- ASSIGN ACTIVITIES -->

<div class="section">

<h2>Assign Activities</h2>

<div class="grid">

<button>Assign Quiz</button>

<button>Assign Task</button>

<button>Assign Case Study</button>

<button>Assign Project</button>

</div>

</div>



<!-- SUBMISSIONS -->

<div class="section">

<h2>Student Submissions</h2>

<div class="grid">

<button>View Submissions</button>

<button>Evaluate</button>

<button>Give Feedback</button>

</div>

</div>



<!-- REPORTS -->

<div class="section">

<h2>Reports</h2>

<div class="grid">

<button>Batch Performance</button>

<button>Student Performance</button>

</div>

</div>



<!-- LOGOUT -->

<div class="logout-section">

<button class="logout-btn">

Logout

</button>

</div>


</div>

</body>

</html>
