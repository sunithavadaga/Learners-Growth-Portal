<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<link rel="stylesheet"
href="./css/student-dashboard.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

</head>

<body>


<div class="dashboard-container">

<h1>Learner Growth Portal</h1>

<h2>WELCOME BACK, LEARNER!</h2>

<p>
Continue Your Growth Journey.
</p>



<!-- SUMMARY CARDS -->

<div class="summary-cards">

<div class="card">
<h3>Course Progress</h3>
<p>0%</p>
</div>

<div class="card">
<h3>Pending Missions</h3>
<p>0</p>
</div>

<div class="card">
<h3>Completed Missions</h3>
<p>0</p>
</div>

<div class="card">
<h3>Leaderboard Rank</h3>
<p>#0</p>
</div>

</div>



<!-- TODAY'S GROWTH MISSION -->

<div class="section">

<h2>Today's Growth Mission</h2>

<div class="grid">

<button>View Today's Mission</button>

</div>

</div>



<!-- COURSE DETAILS -->

<div class="section">

<h2>Course Details</h2>

<div class="grid">

<button>View Course Details</button>

<button>View Batch Details</button>

</div>

</div>



<!-- GROWTH MISSIONS -->

<div class="section">

<h2>Growth Missions</h2>

<div class="grid">

<button>View Missions</button>

<button>Submit Mission</button>

<button>Mission History</button>

</div>

</div>



<!-- PERFORMANCE REPORT -->

<div class="section">

<h2>Performance Report</h2>

<div class="grid">

<button>Quiz Scores</button>

<button>Assignment Scores</button>

<button>Overall Performance</button>

</div>

</div>



<!-- LEARNING RESOURCES -->

<div class="section">

<h2>Learning Resources</h2>

<div class="grid">

<button>Datasets</button>

<button>Reference Materials</button>

<button>Practice Resources</button>

</div>

</div>



<!-- LEADERBOARD -->

<div class="section">

<h2>Leaderboard</h2>

<div class="grid">

<button>View Rank</button>

<button>Top Performers</button>

</div>

</div>



<!-- ACHIEVEMENTS -->

<div class="section">

<h2>Achievements</h2>

<div class="grid">

<button>Certificates</button>

<button>Milestones</button>

</div>

</div>



<!-- LOGOUT -->

<div class="logout-section">

<button class="logout-btn">

Logout

</button>

</div>


</div>

</body>

</html>
